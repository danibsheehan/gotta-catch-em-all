<h2 class="pokemon-cta">Choose Your Pokemon!</h2>

@if (pokemonTypesError) {
  <div class="pokemon-selector-error">{{ pokemonTypesError }}</div>
}

<div class="pokemon-search-container">
  <div class="pokemon-type-container">
    @for (pokemonType of pokemonTypes; track pokemonType) {
      <div class="pokemon-type-item">
        <app-pokemon-type [pokemonType]="pokemonType"></app-pokemon-type>
      </div>
    }
  </div>
</div>
