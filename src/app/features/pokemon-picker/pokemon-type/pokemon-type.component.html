<button
  #typeButton
  type="button"
  class="pokemon-type-button"
  [id]="'type-btn-' + pokemonType.name"
  [attr.aria-expanded]="isOpen"
  [attr.aria-controls]="'type-panel-' + pokemonType.name"
  (click)="toggleTypeDropdown()">
  {{ pokemonType.name }}
</button>

@if (isOpen) {
  <div
    class="pokemon-type-dropdown-container"
    [id]="'type-panel-' + pokemonType.name"
    role="region"
    [attr.aria-labelledby]="'type-btn-' + pokemonType.name">
    @if (isLoadingPokemonNames) {
      <span class="pokemon-type-loading" role="status" aria-busy="true">✨ loading names…</span>
    }
    @if (pokemonLoadError) {
      <span class="pokemon-type-error">{{ pokemonLoadError }}</span>
    }
    @if (pokemonNames.length) {
      <select
        #pokemonSelect
        class="pokemon-type-dropdown"
        [attr.aria-label]="'choose a ' + pokemonType.name + ' pokémon'"
        (change)="selectPokemon($any($event.target).value)">
        <option value="">choose a pokémon</option>
        @for (pokemonName of pokemonNames; track pokemonName) {
          <option [value]="pokemonName">{{ pokemonName }}</option>
        }
      </select>
    }
    @if (!isLoadingPokemonNames && !pokemonLoadError && !pokemonNames.length) {
      <span class="pokemon-type-loading">👀 no {{ pokemonType.name }} friends here…</span>
    }
  </div>
}
