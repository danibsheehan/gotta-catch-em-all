<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pokémon battle — choose your Pokémon</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Warm connections for JSON (CORS) and sprite images to improve LCP -->
  <link rel="preconnect" href="https://pokeapi.co" crossorigin>
  <link rel="preconnect" href="https://raw.githubusercontent.com">
  <link rel="dns-prefetch" href="https://pokeapi.co">
  <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
  <!-- Critical above-the-fold: no dependency on external CSS or Angular (FCP/LCP on mobile) -->
  <style>
    html, body {
      margin: 0;
    }
    body {
      background: #fff;
      color: #000;
    }
    app-root {
      display: block;
    }
    .app-hero-title {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 auto 0.25em;
      max-width: 100%;
      padding-top: 0.25rem;
      text-align: center;
      width: 95%;
    }
    .skip-link {
      background: #000;
      color: #fff;
      left: -9999px;
      padding: 0.5rem 1rem;
      position: absolute;
      text-decoration: none;
      top: 0;
      z-index: 10000;
    }
    .skip-link:focus {
      left: 1rem;
      top: 1rem;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <h1 class="app-hero-title">Pokemon Battle Royale!</h1>
  <main id="main-content">
    <app-root></app-root>
  </main>
</body>
</html>
